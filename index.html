<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>離乳食 週次献立生成</title>
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;margin:16px;background:#f4f6f8}
    .card{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:12px}
    button{padding:12px 14px;border-radius:12px;border:0;background:#2563eb;color:#fff;font-weight:800}
    select{padding:10px;border-radius:12px;border:1px solid #e5e7eb}
    .ghost{background:#fff;border:1px solid #e5e7eb;color:#111827}
    .row{display:flex;gap:8px;flex-wrap:wrap}
    hr{border:none;border-top:1px solid #e5e7eb;margin:12px 0}

    details{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:10px}
    summary{cursor:pointer;list-style:none;font-weight:900;display:flex;align-items:center;justify-content:space-between}
    summary::-webkit-details-marker{display:none}
    .sumRight{font-weight:700;color:#6b7280;font-size:12px}
    details[open] summary{margin-bottom:8px}
    .accBody{padding-top:6px}

    .chipLabel{
      display:inline-flex;
      align-items:center;
      gap:8px;
      margin:6px 10px 6px 0;
      padding:8px 10px;
      border:1px solid #e5e7eb;
      border-radius:12px;
      background:#fff;
    }
    .chipLabel input{ width:18px; height:18px; }

    .day{margin:12px 0;padding:12px;border:1px solid #e5e7eb;border-radius:14px;background:#fff}
    .meal{margin-top:10px;padding-top:10px;border-top:1px dashed #e5e7eb}
    .title{font-weight:900}
    .sub{color:#6b7280;font-size:12px;margin-top:4px}
    .badge{display:inline-block;font-size:11px;padding:3px 8px;border:1px solid #e5e7eb;border-radius:999px;margin-right:6px}
    .warn{background:#fff7ed;border-color:#fed7aa}
    .ok{background:#ecfdf5;border-color:#bbf7d0}
    .list{margin:6px 0 0;padding-left:18px}

    .genBar{
      position: sticky;
      bottom: 10px;
      background: rgba(244,246,248,0.95);
      padding: 10px;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      backdrop-filter: blur(6px);
      margin-top: 12px;
    }
    .genBarInner{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .genBtn{flex:1;min-width:220px}

    .err{
      white-space:pre-wrap;
      word-break:break-word;
      background:#fff1f2;
      border:1px solid #fecdd3;
      color:#7f1d1d;
      padding:10px;
      border-radius:12px;
      margin:10px 0;
      display:none;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1 style="margin:0 0 10px;">離乳食 週次献立生成</h1>

    <div id="err" class="err"></div>

    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
      <div>
        <label>フェーズ：</label>
        <select id="phase">
          <option>初期</option>
          <option selected>中期</option>
          <option>後期</option>
          <option>完了期</option>
        </select>
      </div>

      <button id="shareLink" class="ghost" type="button">家族に共有リンク</button>
      <button id="exportState" class="ghost" type="button">設定エクスポート</button>
      <button id="importState" class="ghost" type="button">設定インポート</button>
    </div>

    <hr>

    <h2 style="margin:0 0 6px;">在庫（今週使う食材セット）</h2>
    <div class="sub">チェックした食材だけで1週間を組みます（在庫は基本8ブロック）。</div>

    <div style="display:grid;grid-template-columns:1fr;gap:10px;margin-top:10px;">
      <details open>
        <summary><span>炭水化物</span><span class="sumRight" id="countCarb">0件選択</span></summary>
        <div class="accBody"><div id="invCarb" class="row"></div></div>
      </details>

      <details>
        <summary><span>タンパク質</span><span class="sumRight" id="countProtein">0件選択</span></summary>
        <div class="accBody"><div id="invProtein" class="row"></div></div>
      </details>

      <details>
        <summary><span>ミネラル（野菜/果物など）</span><span class="sumRight" id="countMineral">0件選択</span></summary>
        <div class="accBody"><div id="invMineral" class="row"></div></div>
      </details>
    </div>

    <hr>

    <h2 style="margin:0 0 6px;">新食材（平日1回目に小さじ1）</h2>
    <div class="sub">在庫で選んでいない食材から選べます。チェック順に、月〜金の1回目に1つずつ入ります（最大5つ）。</div>

    <details>
      <summary><span>新食材候補</span><span class="sumRight" id="countNew">0件選択</span></summary>
      <div class="accBody"><div id="newFoods" class="row"></div></div>
    </details>

    <div class="genBar">
      <div class="genBarInner">
        <button id="gen" class="genBtn">この設定で1週間生成</button>
        <div class="sub" id="genHint">在庫をチェックしてから押してね</div>
      </div>
    </div>

    <h2 style="margin:14px 0 6px;">結果</h2>
    <div id="out">設定して「この設定で1週間生成」を押してね</div>
  </div>

  <script type="module">
    const errEl = document.getElementById("err");
    const showErr = (e, label="エラー") => {
      console.error(e);
      errEl.style.display = "block";
      errEl.textContent =
        label + ":\n" +
        (e?.message || String(e)) +
        (e?.stack ? "\n\n" + e.stack : "");
    };

    window.addEventListener("error", (ev) => showErr(ev?.error || ev, "JS実行エラー"));
    window.addEventListener("unhandledrejection", (ev) => showErr(ev?.reason || ev, "Promiseエラー"));

    let FOOD_MASTER, generateWeeklyPlanWithInventory;

    try{
      ({ FOOD_MASTER } = await import("./js/foodMaster.js"));
    }catch(e){
      showErr(e, "foodMaster.js 読み込み失敗（./js/foodMaster.js）");
      throw e;
    }

    try{
      ({ generateWeeklyPlanWithInventory } = await import("./js/planner.js"));
    }catch(e){
      showErr(e, "planner.js 読み込み失敗（./js/planner.js）");
      throw e;
    }

    const phaseEl = document.getElementById("phase");
    const outEl = document.getElementById("out");
    const genBtn = document.getElementById("gen");

    const invCarbEl = document.getElementById("invCarb");
    const invProteinEl = document.getElementById("invProtein");
    const invMineralEl = document.getElementById("invMineral");
    const newFoodsEl = document.getElementById("newFoods");

    const countCarbEl = document.getElementById("countCarb");
    const countProteinEl = document.getElementById("countProtein");
    const countMineralEl = document.getElementById("countMineral");
    const countNewEl = document.getElementById("countNew");

    const genHintEl = document.getElementById("genHint");

    const shareBtn = document.getElementById("shareLink");
    const exportBtn = document.getElementById("exportState");
    const importBtn = document.getElementById("importState");

    const LS_KEY = "babyfood_planner_state_v1";

    const defaultState = () => ({
      phase: "中期",
      inv: { carb:{}, protein:{}, mineral:{} },
      newQueue: []
    });

    function safeJsonParse(s){
      try{ return JSON.parse(s); }catch(e){ return null; }
    }

    function loadState(){
      const hash = location.hash || "";
      const m = hash.match(/state=([^&]+)/);
      if(m && m[1]){
        try{
          const obj = JSON.parse(decodeURIComponent(escape(atob(m[1]))));
          localStorage.setItem(LS_KEY, JSON.stringify(obj));
          history.replaceState(null, "", location.pathname + location.search);
          return { ...defaultState(), ...obj };
        }catch(e){}
      }

      const raw = localStorage.getItem(LS_KEY);
      const obj = raw ? safeJsonParse(raw) : null;
      return obj ? { ...defaultState(), ...obj } : defaultState();
    }

    let state = loadState();
    phaseEl.value = state.phase || "中期";

    function saveState(){
      state.phase = phaseEl.value;
      localStorage.setItem(LS_KEY, JSON.stringify(state));
    }

    function selectedKeys(mapObj){
      return Object.keys(mapObj || {}).filter(k => mapObj[k]);
    }

    function categoryOfFactory(phase){
      const m = FOOD_MASTER?.[phase];
      if(!m) return () => null;
      const setCarb = new Set(m.carb || []);
      const setPro = new Set(m.protein || []);
      const setMin = new Set(m.mineral || []);
      return (name)=>{
        if(setCarb.has(name)) return "carb";
        if(setPro.has(name)) return "protein";
        if(setMin.has(name)) return "mineral";
        return null;
      };
    }

    function renderChecklist(container, items, checkedMap, onChange){
      container.innerHTML = "";
      (items || []).forEach(name=>{
        const label = document.createElement("label");
        label.className = "chipLabel";

        const cb = document.createElement("input");
        cb.type="checkbox";
        cb.checked = !!checkedMap[name];
        cb.addEventListener("change", ()=>{
          checkedMap[name] = cb.checked;
          onChange();
        });

        const span = document.createElement("span");
        span.textContent = name;

        label.appendChild(cb);
        label.appendChild(span);
        container.appendChild(label);
      });
    }

    function renderNewFoods(container, items, queue){
      container.innerHTML = "";
      (items || []).forEach(name=>{
        const label = document.createElement("label");
        label.className = "chipLabel";

        const cb = document.createElement("input");
        cb.type="checkbox";
        cb.checked = queue.includes(name);

        cb.addEventListener("change", ()=>{
          if(cb.checked){
            if(!queue.includes(name)) queue.push(name);
          }else{
            const idx = queue.indexOf(name);
            if(idx>=0) queue.splice(idx,1);
          }
          saveState();
          updateCounts();
        });

        const span = document.createElement("span");
        span.textContent = name;

        label.appendChild(cb);
        label.appendChild(span);
        container.appendChild(label);
      });
    }

    function rebuildNewCandidates(){
      const phase = phaseEl.value;
      const master = FOOD_MASTER[phase];

      const chosen = new Set([
        ...selectedKeys(state.inv.carb),
        ...selectedKeys(state.inv.protein),
        ...selectedKeys(state.inv.mineral)
      ]);

      const newCandidates = [
        ...(master.carb||[]).filter(x=>!chosen.has(x)),
        ...(master.protein||[]).filter(x=>!chosen.has(x)),
        ...(master.mineral||[]).filter(x=>!chosen.has(x))
      ];

      state.newQueue = (state.newQueue||[]).filter(x => newCandidates.includes(x));
      renderNewFoods(newFoodsEl, newCandidates, state.newQueue);
      saveState();
      updateCounts();
    }

    function updateCounts(){
      const baseCarb = selectedKeys(state.inv?.carb).length;
      const basePro  = selectedKeys(state.inv?.protein).length;
      const baseMin  = selectedKeys(state.inv?.mineral).length;
      const newCount = (state.newQueue||[]).length;

      countCarbEl.textContent = `${baseCarb}件選択`;
      countProteinEl.textContent = `${basePro}件選択`;
      countMineralEl.textContent = `${baseMin}件選択`;
      countNewEl.textContent = `${newCount}件選択`;

      const total = baseCarb + basePro + baseMin;
      genHintEl.textContent = total ? `在庫チェック済み：合計${total}件（＋新食材は最大5つ）` : "在庫をチェックしてから押してね";
    }

    function rebuildUI(){
      try{
        const phase = phaseEl.value;
        const master = FOOD_MASTER[phase];
        if(!master) throw new Error("FOOD_MASTERにこのフェーズがありません: " + phase);

        state.inv ||= { carb:{}, protein:{}, mineral:{} };
        state.inv.carb ||= {};
        state.inv.protein ||= {};
        state.inv.mineral ||= {};
        state.newQueue ||= [];

        const onInvChange = () => { saveState(); updateCounts(); rebuildNewCandidates(); };

        renderChecklist(invCarbEl, master.carb, state.inv.carb, onInvChange);
        renderChecklist(invProteinEl, master.protein, state.inv.protein, onInvChange);
        renderChecklist(invMineralEl, master.mineral, state.inv.mineral, onInvChange);

        rebuildNewCandidates();
        updateCounts();

        outEl.textContent = "設定して「この設定で1週間生成」を押してね";
      }catch(e){
        showErr(e, "UI構築エラー（チェックボックスが出ない原因）");
      }
    }

    function esc(s){
      return String(s ?? "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;");
    }

    function renderPlan(result){
      const warnings = (result.warnings && result.warnings.length) ? result.warnings : [];
      const plan = result.plan || [];
      const leftovers = result.leftovers || {};

      // dayごと
      const byDay = new Map();
      for (const p of plan){
        if(!byDay.has(p.day)) byDay.set(p.day, []);
        byDay.get(p.day).push(p);
      }

      let html = "";

      if (warnings.length){
        html += `<div class="day"><div class="title">Warnings</div><ul class="list">` +
          warnings.map(w => `<li>${esc(w)}</li>`).join("") +
          `</ul></div>`;
      }

      const line = (arr, label) => {
        const s = (arr||[]).map(x => `${x.name} 小さじ${x.tsp}`).join("、") || "—";
        return `<div class="sub">${label}: ${esc(s)}</div>`;
      };

      for (const [day, meals] of byDay.entries()){
        html += `<div class="day"><div class="title">${esc(day)}曜日</div>`;
        for (const m of meals){
          const okBadge = m.ok ? `<span class="badge ok">OK</span>` : `<span class="badge warn">要確認</span>`;
          html += `
            <div class="meal">
              <div>${okBadge}<b>${esc(m.meal)}回目：</b>${esc(m.menuName || "献立")}</div>
              <div class="sub">目安：炭水化物${m.targetsTsp.carb} / タンパク${m.targetsTsp.protein} / ミネラル${m.targetsTsp.mineral}（小さじ）</div>
              ${line(m.blocks.carb, "炭水化物")}
              ${line(m.blocks.protein, "タンパク")}
              ${line(m.blocks.mineral, "ミネラル")}
            </div>
          `;
        }
        html += `</div>`;
      }

      // ✅ 余り在庫（ここが今回の追加/復活）
      const lfLine = (arr, label, tspPerBlockHint) => {
        const items = (arr || []).map(x => {
          const b = Number.isFinite(+x.remainBlocks) ? +x.remainBlocks : 0;
          const nice = (Math.round(b*10)/10);
          return `${x.name} 残${nice}ブロック`;
        }).join("、");
        const s = items || "なし";
        return `<div class="sub">${esc(label)}: ${esc(s)}${tspPerBlockHint ? ` <span class="sub">(${esc(tspPerBlockHint)})</span>` : ""}</div>`;
      };

      html += `<div class="day"><div class="title">余り在庫</div>`;
      html += lfLine(leftovers.carb, "炭水化物", "1ブロック=小さじ10");
      html += lfLine(leftovers.protein, "タンパク", "1ブロック=小さじ1");
      html += lfLine(leftovers.mineral, "ミネラル", "単品=小さじ1 / 野菜ミックス=小さじ3 / 果物ミックス=小さじ2");
      html += `</div>`;

      outEl.innerHTML = html;
    }

    genBtn.addEventListener("click", ()=>{
      try{
        const phase = phaseEl.value;
        const categoryOf = categoryOfFactory(phase);

        const invOverride = {
          carb: selectedKeys(state.inv.carb).map(name=>({name, blocks:8})),
          protein: selectedKeys(state.inv.protein).map(name=>({name, blocks:8})),
          mineral: selectedKeys(state.inv.mineral).map(name=>({name, blocks:8}))
        };

        const result = generateWeeklyPlanWithInventory({
          phase,
          inventoryOverride: invOverride,
          newFoodRule: {
            enabled: true,
            weekdayOnly: true,
            mealNo: 1,
            tsp: 1,
            queue: state.newQueue,
            categoryOf
          }
        });

        renderPlan(result);
      }catch(e){
        showErr(e, "生成エラー（ボタン押下）");
      }
    });

    // 共有/エクスポート/インポート
    shareBtn.addEventListener("click", async ()=>{
      try{
        const token = btoa(unescape(encodeURIComponent(JSON.stringify(state))));
        const url = location.origin + location.pathname + "#state=" + token;
        if(navigator.share){
          await navigator.share({ title:"離乳食プラン設定", url });
        }else{
          await navigator.clipboard.writeText(url);
          alert("共有リンクをコピーしました");
        }
      }catch(e){
        showErr(e, "共有リンク作成エラー");
      }
    });

    exportBtn.addEventListener("click", async ()=>{
      try{
        const json = JSON.stringify(state, null, 2);
        await navigator.clipboard.writeText(json);
        alert("設定JSONをコピーしました");
      }catch(e){
        showErr(e, "エクスポート失敗");
      }
    });

    importBtn.addEventListener("click", ()=>{
      try{
        const txt = prompt("設定JSONを貼り付けてOKを押してね");
        if(!txt) return;
        const obj = JSON.parse(txt);
        state = { ...defaultState(), ...obj };
        phaseEl.value = state.phase || "中期";
        saveState();
        rebuildUI();
        alert("インポートしました");
      }catch(e){
        showErr(e, "インポート失敗");
      }
    });

    phaseEl.addEventListener("change", ()=>{
      saveState();
      rebuildUI();
    });

    rebuildUI();
  </script>
</body>
</html>
