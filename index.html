<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>離乳食 週次献立プランナー</title>
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;margin:16px;background:#f4f6f8}
    .card{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:12px}
    button{padding:10px 12px;border-radius:12px;border:0;background:#2563eb;color:#fff;font-weight:700}
    select{padding:10px;border-radius:12px;border:1px solid #e5e7eb}
    pre{white-space:pre-wrap;word-break:break-word}
  </style>
</head>
<body>
  <div class="card">
    <h1 style="margin:0 0 10px;">離乳食 週次献立プランナー</h1>

    <label>フェーズ：</label>
    <select id="phase">
      <option>初期</option>
      <option selected>中期</option>
      <option>後期</option>
      <option>完了期</option>
    </select>

    <button id="gen" style="margin-left:8px;">1週間生成</button>

    <h2>結果</h2>
    <pre id="out">まだ生成していません</pre>
  </div>

  <script type="module">
    import { generateWeeklyPlan } from "./js/planner.js";

    const phaseEl = document.getElementById("phase");
    const outEl = document.getElementById("out");
    const genBtn = document.getElementById("gen");

    genBtn.addEventListener("click", () => {
      const result = generateWeeklyPlan({ phase: phaseEl.value });
      // ひとまずJSON表示（あとで表UIにできる）
      outEl.textContent = JSON.stringify(result.plan, null, 2);
    });
  </script>
</body>
</html>
