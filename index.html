<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>離乳食 週次献立プランナー</title>
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;margin:16px;background:#f4f6f8}
    .card{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:12px}
    button{padding:12px 14px;border-radius:12px;border:0;background:#2563eb;color:#fff;font-weight:800}
    select{padding:10px;border-radius:12px;border:1px solid #e5e7eb}
    .ghost{background:#fff;border:1px solid #e5e7eb;color:#111827}
    .day{margin:12px 0;padding:12px;border:1px solid #e5e7eb;border-radius:14px;background:#fff}
    .meal{margin-top:10px;padding-top:10px;border-top:1px dashed #e5e7eb}
    .title{font-weight:900}
    .sub{color:#6b7280;font-size:12px;margin-top:4px}
    .badge{display:inline-block;font-size:11px;padding:3px 8px;border:1px solid #e5e7eb;border-radius:999px;margin-right:6px}
    .warn{background:#fff7ed;border-color:#fed7aa}
    .ok{background:#ecfdf5;border-color:#bbf7d0}
    .list{margin:6px 0 0;padding-left:18px}
    .chipLabel{display:inline-flex;align-items:center;gap:8px;margin:6px 10px 6px 0;padding:8px 10px;border:1px solid #e5e7eb;border-radius:12px;background:#fff}
    .row{display:flex;gap:8px;flex-wrap:wrap}
    hr{border:none;border-top:1px solid #e5e7eb;margin:12px 0}

    /* Accordion */
    details{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:10px}
    summary{cursor:pointer;list-style:none;font-weight:900;display:flex;align-items:center;justify-content:space-between}
    summary::-webkit-details-marker{display:none}
    .sumRight{font-weight:700;color:#6b7280;font-size:12px}
    details[open] summary{margin-bottom:8px}
    .accBody{padding-top:6px}

    /* Generate bar */
    .genBar{
      position: sticky;
      bottom: 10px;
      background: rgba(244,246,248,0.95);
      padding: 10px;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      backdrop-filter: blur(6px);
      margin-top: 12px;
    }
    .genBarInner{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .genBtn{flex:1;min-width:220px}
  </style>
</head>
<body>
  <div class="card">
    <h1 style="margin:0 0 10px;">離乳食 週次献立プランナー</h1>

    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
      <div>
        <label>フェーズ：</label>
        <select id="phase">
          <option>初期</option>
          <option selected>中期</option>
          <option>後期</option>
          <option>完了期</option>
        </select>
      </div>

      <button id="shareLink" class="ghost" type="button">家族に共有リンク</button>
      <button id="exportState" class="ghost" type="button">設定エクスポート</button>
      <button id="importState" class="ghost" type="button">設定インポート</button>
    </div>

    <hr>

    <h2 style="margin:0 0 6px;">在庫（今週使う食材セット）</h2>
    <div class="sub">チェックした食材だけで1週間を組みます（在庫は基本8ブロック）。</div>

    <div style="display:grid;grid-template-columns:1fr;gap:10px;margin-top:10px;">
      <details id="accCarb" open>
        <summary>
          <span>炭水化物</span>
          <span class="sumRight" id="countCarb">0件選択</span>
        </summary>
        <div class="accBody">
          <div id="invCarb" class="row"></div>
        </div>
      </details>

      <details id="accProtein">
        <summary>
          <span>タンパク質</span>
          <span class="sumRight" id="countProtein">0件選択</span>
        </summary>
        <div class="accBody">
          <div id="invProtein" class="row"></div>
        </div>
      </details>

      <details id="accMineral">
        <summary>
          <span>ミネラル（野菜/果物など）</span>
          <span class="sumRight" id="countMineral">0件選択</span>
        </summary>
        <div class="accBody">
          <div id="invMineral" class="row"></div>
        </div>
      </details>
    </div>

    <hr>

    <h2 style="margin:0 0 6px;">新食材（平日1回目に小さじ1）</h2>
    <div class="sub">在庫で選んでいない食材から選べます。チェック順に、月〜金の1回目に1つずつ入ります。</div>

    <details id="accNewFoods">
      <summary>
        <span>新食材候補</span>
        <span class="sumRight" id="countNew">0件選択</span>
      </summary>
      <div class="accBody">
        <div id="newFoods" class="row"></div>
      </div>
    </details>

    <!-- 生成ボタン：チェックの後に押せる位置 -->
    <div class="genBar">
      <div class="genBarInner">
        <button id="gen" class="genBtn">この設定で1週間生成</button>
        <div class="sub" id="genHint">在庫をチェックしてから押してね</div>
      </div>
    </div>

    <h2 style="margin:14px 0 6px;">結果</h2>
    <div id="out">設定して「この設定で1週間生成」を押してね</div>
  </div>

  <script type="module">
    import { FOOD_MASTER } from "./js/foodMaster.js";
    import { generateWeeklyPlanWithInventory } from "./js/planner.js";

    const phaseEl = document.getElementById("phase");
    const outEl = document.getElementById("out");
    const genBtn = document.getElementById("gen");
    const genHintEl = document.getElementById("genHint");

    const invCarbEl = document.getElementById("invCarb");
    const invProteinEl = document.getElementById("invProtein");
    const invMineralEl = document.getElementById("invMineral");
    const newFoodsEl = document.getElementById("newFoods");

    const countCarbEl = document.getElementById("countCarb");
    const countProteinEl = document.getElementById("countProtein");
    const countMineralEl = document.getElementById("countMineral");
    const countNewEl = document.getElementById("countNew");

    const shareBtn = document.getElementById("shareLink");
    const exportBtn = document.getElementById("exportState");
    const importBtn = document.getElementById("importState");

    // モバイル用：エラーを画面に出す
    window.addEventListener("error", (e) => {
      outEl.textContent = "JSエラー: " + (e?.message || "unknown");
    });

    const LS_KEY = "babyfood_planner_state_v1";

    function esc(s){
      return String(s ?? "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;");
    }

    function b64EncodeUnicode(obj){
      const json = JSON.stringify(obj);
      return btoa(unescape(encodeURIComponent(json)));
    }
    function b64DecodeUnicode(s){
      const json = decodeURIComponent(escape(atob(s)));
      return JSON.parse(json);
    }

    function defaultState(){
      return { phase: "中期", inv: { carb:{}, protein:{}, mineral:{} }, newQueue: [] };
    }

    function loadState(){
      const hash = location.hash || "";
      const m = hash.match(/state=([^&]+)/);
      if (m && m[1]) {
        try {
          const imported = b64DecodeUnicode(m[1]);
          localStorage.setItem(LS_KEY, JSON.stringify(imported));
          history.replaceState(null, "", location.pathname + location.search);
          return imported;
        } catch (e) {}
      }
      try{
        const raw = localStorage.getItem(LS_KEY);
        if(!raw) return defaultState();
        return { ...defaultState(), ...JSON.parse(raw) };
      }catch(e){
        return defaultState();
      }
    }

    let state = loadState();
    phaseEl.value = state.phase || "中期";

    function saveState(){
      localStorage.setItem(LS_KEY, JSON.stringify(state));
    }

    function categoryOfFactory(phase){
      const m = FOOD_MASTER[phase];
      const setCarb = new Set(m.carb);
      const setPro = new Set(m.protein);
      const setMin = new Set(m.mineral);
      return (name)=>{
        if(setCarb.has(name)) return "carb";
        if(setPro.has(name)) return "protein";
        if(setMin.has(name)) return "mineral";
        return null;
      };
    }

    function countSelected(mapObj){
      return Object.keys(mapObj || {}).filter(k => mapObj[k]).length;
    }

    function updateCounts(){
      const c = countSelected(state.inv?.carb);
      const p = countSelected(state.inv?.protein);
      const m = countSelected(state.inv?.mineral);
      const n = (state.newQueue || []).length;

      countCarbEl.textContent = `${c}件選択`;
      countProteinEl.textContent = `${p}件選択`;
      countMineralEl.textContent = `${m}件選択`;
      countNewEl.textContent = `${n}件選択`;

      const total = c + p + m;
      genHintEl.textContent =
        total === 0 ? "在庫をチェックしてから押してね" : `在庫合計 ${total} 件（炭水化物${c}/タンパク${p}/ミネラル${m}）`;
    }

    function renderChecklist(container, items, checkedMap, onChange){
      container.innerHTML = "";
      items.forEach(name=>{
        const label = document.createElement("label");
        label.className = "chipLabel";

        const cb = document.createElement("input");
        cb.type="checkbox";
        cb.checked = !!checkedMap[name];
        cb.addEventListener("change", ()=>{
          checkedMap[name] = cb.checked;
          onChange();
        });

        const span = document.createElement("span");
        span.textContent = name;

        label.appendChild(cb);
        label.appendChild(span);
        container.appendChild(label);
      });
    }

    function renderNewFoods(container, items, queue){
      container.innerHTML = "";
      items.forEach(name=>{
        const label = document.createElement("label");
        label.className = "chipLabel";

        const cb = document.createElement("input");
        cb.type="checkbox";
        cb.checked = queue.includes(name);

        cb.addEventListener("change", ()=>{
          if(cb.checked){
            if(!queue.includes(name)) queue.push(name);
          }else{
            const idx = queue.indexOf(name);
            if(idx>=0) queue.splice(idx,1);
          }
          saveState();
          updateCounts();
        });

        const span = document.createElement("span");
        span.textContent = name;

        label.appendChild(cb);
        label.appendChild(span);
        container.appendChild(label);
      });
    }

    function rebuildNewCandidates(){
      const phase = phaseEl.value;
      const master = FOOD_MASTER[phase];

      const chosen = new Set([
        ...Object.keys(state.inv.carb).filter(k=>state.inv.carb[k]),
        ...Object.keys(state.inv.protein).filter(k=>state.inv.protein[k]),
        ...Object.keys(state.inv.mineral).filter(k=>state.inv.mineral[k])
      ]);

      const newCandidates = [
        ...master.carb.filter(x=>!chosen.has(x)),
        ...master.protein.filter(x=>!chosen.has(x)),
        ...master.mineral.filter(x=>!chosen.has(x))
      ];

      state.newQueue = state.newQueue.filter(x => newCandidates.includes(x));
      renderNewFoods(newFoodsEl, newCandidates, state.newQueue);
      saveState();
      updateCounts();
    }

    function rebuildUI(){
      const phase = phaseEl.value;
      const master = FOOD_MASTER[phase];

      state.inv ||= { carb:{}, protein:{}, mineral:{} };
      state.inv.carb ||= {};
      state.inv.protein ||= {};
      state.inv.mineral ||= {};
      state.newQueue ||= [];

      // チェックごとにUI全再描画しない（スクロール飛び防止）
      const onInvChange = () => { saveState(); updateCounts(); rebuildNewCandidates(); };

      renderChecklist(invCarbEl, master.carb, state.inv.carb, onInvChange);
      renderChecklist(invProteinEl, master.protein, state.inv.protein, onInvChange);
      renderChecklist(invMineralEl, master.mineral, state.inv.mineral, onInvChange);

      rebuildNewCandidates();

      state.phase = phase;
      saveState();
      updateCounts();
    }

    function renderPlan(result){
      const warnings = (result.warnings && result.warnings.length) ? result.warnings : [];
      const plan = result.plan || [];

      const byDay = new Map();
      for (const p of plan){
        if(!byDay.has(p.day)) byDay.set(p.day, []);
        byDay.get(p.day).push(p);
      }

      let html = "";

      // ✅ 不足ブロック表示（カテゴリ合計）
      if (result.requiredBlocksPerWeek && result.availableBlocks && result.shortageBlocks) {
        const r = result.requiredBlocksPerWeek;
        const a = result.availableBlocks;
        const s = result.shortageBlocks;

        const line = (label, key) => {
          const shortage = s[key] || 0;
          const badge = shortage > 0
            ? `<span class="badge warn">不足 +${shortage}ブロック</span>`
            : `<span class="badge ok">不足なし</span>`;
          return `
            <div class="sub">
              ${badge}
              <b>${label}</b>：必要 ${r[key]} / 在庫 ${a[key]}（ブロック）
            </div>
          `;
        };

        html += `
          <div class="day">
            <div class="title">在庫不足チェック</div>
            ${line("炭水化物", "carb")}
            ${line("タンパク質", "protein")}
            ${line("ミネラル", "mineral")}
            <div class="sub">※不足があるカテゴリは、チェックする食材を増やすと埋まりやすくなります。</div>
          </div>
        `;
      }

      if (warnings.length){
        html += `<div class="day"><div class="title">Warnings</div><ul class="list">` +
          warnings.map(w => `<li>${esc(w)}</li>`).join("") +
          `</ul></div>`;
      }

      for (const [day, meals] of byDay.entries()){
        html += `<div class="day"><div class="title">${esc(day)}曜日</div>`;
        for (const m of meals){
          const okBadge = m.ok ? `<span class="badge ok">OK</span>` : `<span class="badge warn">要確認</span>`;
          const newBadge = m.newFood ? `<span class="badge warn">新:${esc(m.newFood)} 小さじ1</span>` : "";

          const toLine = (arr, label) => {
            const items = (arr || []).map(x => `${x.name}×${x.blocks}ブロック${x.isNew ? "(新)" : ""}`).join("、") || "—";
            return `<div class="sub">${label}: ${esc(items)}</div>`;
          };

          html += `
            <div class="meal">
              <div>${okBadge}${newBadge}<b>${esc(m.meal)}回目：</b>${esc(m.menuName)}</div>
              <div class="sub">目安：炭水化物${m.targetsTsp.carb} / タンパク${m.targetsTsp.protein} / ミネラル${m.targetsTsp.mineral}（小さじ）</div>
              ${toLine(m.blocks.carb, "炭水化物")}
              ${toLine(m.blocks.protein, "タンパク")}
              ${toLine(m.blocks.mineral, "ミネラル")}
            </div>
          `;
        }
        html += `</div>`;
      }

      // 余り在庫
      html += `<div class="day"><div class="title">余り在庫</div>`;
      const lf = result.leftovers || {};
      const lfLine = (k, label) => {
        const arr = lf[k] || [];
        const s = arr.length ? arr.map(x => `${x.name}(${x.remainBlocks})`).join("、") : "なし";
        return `<div class="sub">${label}: ${esc(s)}</div>`;
      };
      html += lfLine("carb","炭水化物");
      html += lfLine("protein","タンパク");
      html += lfLine("mineral","ミネラル");
      html += `</div>`;

      outEl.innerHTML = html;
    }

    phaseEl.addEventListener("change", ()=>{
      rebuildUI();
      outEl.textContent = "設定して「この設定で1週間生成」を押してね";
    });

    genBtn.addEventListener("click", ()=>{
      const phase = phaseEl.value;
      const categoryOf = categoryOfFactory(phase);

      const invOverride = {
        carb: Object.keys(state.inv.carb).filter(k=>state.inv.carb[k]).map(name=>({name, blocks:8})),
        protein: Object.keys(state.inv.protein).filter(k=>state.inv.protein[k]).map(name=>({name, blocks:8})),
        mineral: Object.keys(state.inv.mineral).filter(k=>state.inv.mineral[k]).map(name=>({name, blocks:8}))
      };

      const result = generateWeeklyPlanWithInventory({
        phase,
        inventoryOverride: invOverride,
        newFoodRule: {
          enabled: true,
          weekdayOnly: true,
          mealNo: 1,
          tsp: 1,
          queue: state.newQueue,
          categoryOf
        }
      });

      renderPlan(result);
    });

    shareBtn.addEventListener("click", async ()=>{
      const token = b64EncodeUnicode(state);
      const url = location.origin + location.pathname + "#state=" + token;

      try{
        if (navigator.share) {
          await navigator.share({ title:"離乳食プラン設定", url });
        } else {
          await navigator.clipboard.writeText(url);
          alert("共有リンクをコピーしました");
        }
      }catch(e){
        prompt("このリンクをコピーして家族に送ってね", url);
      }
    });

    exportBtn.addEventListener("click", async ()=>{
      const json = JSON.stringify(state, null, 2);
      try{
        await navigator.clipboard.writeText(json);
        alert("設定JSONをコピーしました");
      }catch(e){
        prompt("このJSONをコピーして保存してね", json);
      }
    });

    importBtn.addEventListener("click", ()=>{
      const txt = prompt("設定JSONを貼り付けてOKを押してね");
      if(!txt) return;
      try{
        const obj = JSON.parse(txt);
        state = { ...defaultState(), ...obj };
        phaseEl.value = state.phase || "中期";
        saveState();
        rebuildUI();
        alert("インポートしました");
      }catch(e){
        alert("JSONが読めませんでした");
      }
    });

    rebuildUI();
  </script>
</body>
</html>
