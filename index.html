<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>離乳食進行管理</title>
<style>
  :root{
    --bg:#f4f6f8; --card:#fff; --text:#111827; --muted:#6b7280;
    --pri:#2563eb; --ok:#16a34a; --warn:#f59e0b; --bad:#dc2626;
    --border:#e5e7eb;
  }
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    margin:0; background:var(--bg); color:var(--text); padding:16px 16px 92px;}
  h1{font-size:20px; margin:0 0 12px;}
  .row{display:flex; gap:10px; flex-wrap:wrap;}
  .card{background:var(--card); border:1px solid var(--border); border-radius:14px; padding:12px; box-shadow:0 1px 0 rgba(0,0,0,.03);}
  .card h2{font-size:14px; margin:0 0 10px;}
  label{font-size:12px; color:var(--muted);}
  input,select,textarea{width:100%; box-sizing:border-box; border:1px solid var(--border);
    border-radius:12px; padding:10px; font-size:14px; background:#fff;}
  textarea{min-height:70px; resize:vertical;}
  button{border:0; border-radius:12px; padding:10px 12px; font-weight:600; cursor:pointer;}
  .btn{background:var(--pri); color:#fff;}
  .btn2{background:#111827; color:#fff;}
  .ghost{background:#fff; border:1px solid var(--border); color:var(--text);}
  .pill{display:inline-flex; align-items:center; gap:6px; padding:6px 10px; border-radius:999px;
    background:#eef2ff; color:#3730a3; font-size:12px; font-weight:700;}
  .muted{color:var(--muted); font-size:12px;}
  .grid{display:grid; grid-template-columns:1fr; gap:10px;}
  @media(min-width:860px){ .grid{grid-template-columns: 380px 1fr;} }
  .list{display:flex; flex-direction:column; gap:8px;}
  .item{border:1px solid var(--border); border-radius:14px; padding:10px; background:#fff;}
  .itemTop{display:flex; justify-content:space-between; align-items:flex-start; gap:8px;}
  .foodName{font-weight:800;}
  .bad{color:var(--bad); font-weight:800;}
  .ok{color:var(--ok); font-weight:800;}
  .warn{color:var(--warn); font-weight:800;}
  .tags{display:flex; flex-wrap:wrap; gap:6px; margin-top:6px;}
  .tag{font-size:11px; padding:4px 8px; border-radius:999px; border:1px solid var(--border); color:var(--muted); background:#fff;}
  .kbd{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace; font-size:11px; background:#f3f4f6; padding:2px 6px; border-radius:8px; border:1px solid var(--border);}
  .footerBar{position:fixed; left:0; right:0; bottom:0; background:rgba(244,246,248,.9); backdrop-filter: blur(8px);
    border-top:1px solid var(--border); padding:10px 16px;}
  .footerBar .row{justify-content:space-between; align-items:center;}
  .small{font-size:12px;}
  .danger{background:var(--bad); color:#fff;}
  .right{margin-left:auto;}
  /* ===== Mobile fix ===== */
*{ -webkit-tap-highlight-color: transparent; }
.row{ gap:12px; }

input, select, textarea{
  font-size:16px; /* iOSの勝手なズーム防止 */
}

.card{ padding:14px; }

.footerBar{
  padding:10px 12px;
}

/* アレルゲン（上の設定エリア）をグリッドに */
#allergenBox{
  display:grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap:8px;
}

/* チェックBOXチップの見た目を安定させる */
#allergenBox label{
  display:flex !important;
  align-items:center;
  gap:8px;
  width:100%;
  box-sizing:border-box;
  padding:10px 12px !important;
  border-radius:14px !important;
}

#allergenBox input[type="checkbox"]{
  width:20px;
  height:20px;
  flex:0 0 20px;
}

/* 画面が広めなら3列に */
@media (min-width: 420px){
  #allergenBox{ grid-template-columns: repeat(3, minmax(0, 1fr)); }
}
</style>
</head>
<body>
  <h1>離乳食進行管理</h1>

  <div class="grid">
    <!-- Left -->
    <div class="card">
      <h2>ステージ / 設定</h2>
      <div class="row">
        <div style="flex:1; min-width:160px;">
          <label>離乳食ステージ</label>
          <select id="stage">
            <option value="初期(ごっくん)">初期(ごっくん)</option>
            <option value="中期(もぐもぐ)">中期(もぐもぐ)</option>
            <option value="後期(かみかみ)">後期(かみかみ)</option>
            <option value="完了期(ぱくぱく)">完了期(ぱくぱく)</option>
          </select>
        </div>
        <div style="flex:1; min-width:160px;">
          <label>表示フィルタ</label>
          <select id="filter">
            <option value="all">全部</option>
            <option value="new">未導入(まだ)</option>
            <option value="ok">問題なし</option>
            <option value="caution">注意</option>
            <option value="ng">NG/中止</option>
          </select>
        </div>
      </div>

      <div style="margin-top:10px;">
        <label>検索</label>
        <input id="q" placeholder="例：にんじん、卵、ヨーグルト…" />
      </div>

      <div style="margin-top:12px;">
        <h2 style="margin-bottom:8px;">アレルゲンチェック</h2>
        <div class="row" id="allergenBox"></div>
        <div class="muted" style="margin-top:6px;">※食材ごとにも「含むアレルゲン」を付けられます</div>
      </div>

      <div style="margin-top:12px;">
        <h2 style="margin-bottom:8px;">データ</h2>
        <div class="row">
          <button class="ghost" id="exportBtn">エクスポート(JSON)</button>
          <button class="ghost" id="importBtn">インポート(JSON)</button>
        </div>
        <div class="row" style="margin-top:8px;">
          <button class="danger" id="resetBtn">全削除</button>
        </div>
        <div class="muted" style="margin-top:6px;">保存先：この端末のブラウザ(LocalStorage)</div>
      </div>
    </div>

    <!-- Right -->
    <div class="card">
      <h2>食材を追加</h2>
      <div class="row">
        <div style="flex:2; min-width:200px;">
          <label>食材名</label>
          <input id="foodName" placeholder="例：にんじん / しらす / 卵黄 など" />
        </div>
        <div style="flex:1; min-width:160px;">
          <label>初回日</label>
          <input id="firstDate" type="date" />
        </div>
      </div>

      <div class="row" style="margin-top:8px;">
        <div style="flex:1; min-width:160px;">
          <label>状態</label>
          <select id="status">
            <option value="未導入">未導入</option>
            <option value="問題なし">問題なし</option>
            <option value="注意">注意</option>
            <option value="NG/中止">NG/中止</option>
          </select>
        </div>
        <div style="flex:1; min-width:160px;">
          <label>導入回数</label>
          <input id="times" type="number" min="0" step="1" value="0" />
        </div>
        <div style="flex:2; min-width:240px;">
          <label>含むアレルゲン</label>
          <select id="foodAllergens" multiple></select>
          <div class="muted">複数選択：PCはCtrl/⌘、スマホは長押し等</div>
        </div>
      </div>

      <div style="margin-top:8px;">
        <label>メモ（形状・量・反応など）</label>
        <textarea id="memo" placeholder="例：10倍がゆ小さじ1。問題なし。"></textarea>
      </div>

      <div class="row" style="margin-top:10px;">
        <button class="btn" id="addFoodBtn">食材を保存</button>
        <button class="ghost" id="clearFormBtn">入力クリア</button>
      </div>

      <hr style="border:none;border-top:1px solid var(--border); margin:14px 0;">

      <h2>今日の記録（ログ）</h2>
      <div class="row">
        <div style="flex:1; min-width:160px;">
          <label>日付</label>
          <input id="logDate" type="date" />
        </div>
        <div style="flex:2; min-width:240px;">
          <label>食材（既存から選択）</label>
          <select id="logFood"></select>
        </div>
        <div style="flex:1; min-width:140px;">
          <label>量</label>
          <input id="logAmount" placeholder="例：小さじ2" />
        </div>
      </div>
      <div style="margin-top:8px;">
        <label>反応 / メモ</label>
        <input id="logNote" placeholder="例：口周り少し赤い→注意" />
      </div>
      <div class="row" style="margin-top:10px;">
        <button class="btn2" id="addLogBtn">ログ追加</button>
        <button class="ghost right" id="clearLogsBtn">ログ全削除</button>
      </div>

      <hr style="border:none;border-top:1px solid var(--border); margin:14px 0;">

      <div class="row" style="align-items:center; justify-content:space-between;">
        <h2 style="margin:0;">食材リスト</h2>
        <div class="pill" id="countPill">0 件</div>
      </div>

      <div class="list" id="list" style="margin-top:10px;"></div>

      <hr style="border:none;border-top:1px solid var(--border); margin:14px 0;">

      <h2>ログ一覧</h2>
      <div class="list" id="logs"></div>
    </div>
  </div>

  <div class="footerBar">
    <div class="row">
      <div class="small muted">ショートカット：<span class="kbd">/</span> で検索フォーカス</div>
      <div class="small">ステージ：<b id="stageView"></b></div>
    </div>
  </div>

<script>
const KEY = "weaning_progress_v1";

const ALLERGENS = [
  "卵", "乳", "小麦", "そば", "落花生", "えび", "かに",
  "くるみ", "大豆", "ごま", "魚", "肉", "キウイ", "バナナ"
];

function todayStr(){
  const d = new Date();
  const pad = n => String(n).padStart(2,"0");
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}

function load(){
  try{
    const raw = localStorage.getItem(KEY);
    if(!raw) return { stage:"初期(ごっくん)", allergens:{}, foods:[], logs:[] };
    const data = JSON.parse(raw);
    // 互換
    data.allergens ||= {};
    data.foods ||= [];
    data.logs ||= [];
    data.stage ||= "初期(ごっくん)";
    return data;
  }catch(e){
    return { stage:"初期(ごっくん)", allergens:{}, foods:[], logs:[] };
  }
}

function save(data){
  localStorage.setItem(KEY, JSON.stringify(data));
}

function uid(){
  return Math.random().toString(36).slice(2,10) + Date.now().toString(36);
}

function statusColor(status){
  if(status==="問題なし") return "ok";
  if(status==="注意") return "warn";
  if(status==="NG/中止") return "bad";
  return "";
}

const el = (id)=>document.getElementById(id);

const stageEl = el("stage");
const filterEl = el("filter");
const qEl = el("q");

const foodNameEl = el("foodName");
const firstDateEl = el("firstDate");
const statusEl = el("status");
const timesEl = el("times");
const memoEl = el("memo");
const foodAllergensEl = el("foodAllergens");

const logDateEl = el("logDate");
const logFoodEl = el("logFood");
const logAmountEl = el("logAmount");
const logNoteEl = el("logNote");

const listEl = el("list");
const logsEl = el("logs");
const countPill = el("countPill");
const stageView = el("stageView");

let state = load();

function initAllergens(){
  const box = el("allergenBox");
  box.innerHTML = "";
  ALLERGENS.forEach(a=>{
    const wrap = document.createElement("label");
    wrap.style.display="flex";
    wrap.style.alignItems="center";
    wrap.style.gap="6px";
    wrap.style.fontSize="12px";
    wrap.style.color="var(--text)";
    wrap.style.border="1px solid var(--border)";
    wrap.style.borderRadius="999px";
    wrap.style.padding="6px 10px";
    wrap.style.background="#fff";
    const cb = document.createElement("input");
    cb.type="checkbox";
    cb.checked = !!state.allergens[a];
    cb.addEventListener("change", ()=>{
      state.allergens[a] = cb.checked;
      save(state);
    });
    const t = document.createElement("span");
    t.textContent = a;
    wrap.appendChild(cb); wrap.appendChild(t);
    box.appendChild(wrap);
  });

  // 食材用 multiple select
  foodAllergensEl.innerHTML = "";
  ALLERGENS.forEach(a=>{
    const opt = document.createElement("option");
    opt.value = a;
    opt.textContent = a;
    foodAllergensEl.appendChild(opt);
  });
}

function setDefaults(){
  stageEl.value = state.stage || "初期(ごっくん)";
  stageView.textContent = stageEl.value;

  if(!firstDateEl.value) firstDateEl.value = todayStr();
  if(!logDateEl.value) logDateEl.value = todayStr();
}

function renderFoodSelect(){
  const foods = [...state.foods].sort((a,b)=> (a.name||"").localeCompare(b.name||"","ja"));
  logFoodEl.innerHTML = "";
  foods.forEach(f=>{
    const opt = document.createElement("option");
    opt.value = f.id;
    opt.textContent = f.name;
    logFoodEl.appendChild(opt);
  });
}

function matchesFilter(f){
  const fil = filterEl.value;
  if(fil==="all") return true;
  if(fil==="new") return (f.status==="未導入");
  if(fil==="ok") return (f.status==="問題なし");
  if(fil==="caution") return (f.status==="注意");
  if(fil==="ng") return (f.status==="NG/中止");
  return true;
}

function matchesQuery(f){
  const q = (qEl.value||"").trim().toLowerCase();
  if(!q) return true;
  const hay = `${f.name} ${f.memo||""} ${(f.allergens||[]).join(" ")}`.toLowerCase();
  return hay.includes(q);
}

function render(){
  stageView.textContent = stageEl.value;

  const shown = state.foods
    .filter(matchesFilter)
    .filter(matchesQuery)
    .sort((a,b)=>{
      // 未導入を上へ、次に注意/NG、最後に問題なし
      const rank = s => (s==="未導入"?0:s==="注意"?1:s==="NG/中止"?2:3);
      const r = rank(a.status)-rank(b.status);
      if(r!==0) return r;
      return (a.name||"").localeCompare(b.name||"","ja");
    });

  countPill.textContent = `${shown.length} 件`;

  listEl.innerHTML = "";
  shown.forEach(f=>{
    const div = document.createElement("div");
    div.className = "item";
    const color = statusColor(f.status);
    const statusHtml = color ? `<span class="${color}">${f.status}</span>` : `<span>${f.status}</span>`;

    const first = f.firstDate ? f.firstDate : "—";
    const times = Number.isFinite(+f.times) ? +f.times : 0;

    div.innerHTML = `
      <div class="itemTop">
        <div>
          <div class="foodName">${escapeHtml(f.name)}</div>
          <div class="muted">初回: ${escapeHtml(first)} / 回数: ${times} / 状態: ${statusHtml}</div>
          ${f.memo ? `<div class="muted" style="margin-top:6px;">${escapeHtml(f.memo)}</div>` : ""}
          <div class="tags">
            ${(f.allergens||[]).map(a=>`<span class="tag">アレルゲン:${escapeHtml(a)}</span>`).join("")}
          </div>
        </div>
        <div style="display:flex; flex-direction:column; gap:6px; min-width:110px;">
          <button class="ghost" data-act="edit" data-id="${f.id}">編集</button>
          <button class="ghost" data-act="inc" data-id="${f.id}">回数+1</button>
          <button class="danger" data-act="del" data-id="${f.id}">削除</button>
        </div>
      </div>
    `;
    listEl.appendChild(div);
  });

  // logs
  const logs = [...state.logs].sort((a,b)=> (b.date||"").localeCompare(a.date||""));
  logsEl.innerHTML = "";
  if(logs.length===0){
    const p = document.createElement("div");
    p.className="muted";
    p.textContent="まだログがありません。";
    logsEl.appendChild(p);
  }else{
    logs.forEach(l=>{
      const f = state.foods.find(x=>x.id===l.foodId);
      const name = f ? f.name : "(削除済み食材)";
      const div = document.createElement("div");
      div.className="item";
      div.innerHTML = `
        <div class="itemTop">
          <div>
            <div class="foodName">${escapeHtml(l.date||"—")} / ${escapeHtml(name)}</div>
            <div class="muted">量: ${escapeHtml(l.amount||"—")} / メモ: ${escapeHtml(l.note||"")}</div>
          </div>
          <button class="danger" data-act="logdel" data-id="${l.id}">削除</button>
        </div>
      `;
      logsEl.appendChild(div);
    });
  }

  renderFoodSelect();
  save(state);
}

function escapeHtml(s){
  return String(s??"")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

// Events
stageEl.addEventListener("change", ()=>{
  state.stage = stageEl.value;
  save(state);
  render();
});
filterEl.addEventListener("change", render);
qEl.addEventListener("input", render);

document.addEventListener("keydown", (e)=>{
  if(e.key==="/"){
    e.preventDefault();
    qEl.focus();
  }
});

el("addFoodBtn").addEventListener("click", ()=>{
  const name = (foodNameEl.value||"").trim();
  if(!name){ alert("食材名を入れてね"); return; }

  const selectedAllergens = Array.from(foodAllergensEl.selectedOptions).map(o=>o.value);

  const existing = state.foods.find(f=>f.name===name);
  if(existing && !confirm("同名の食材があります。上書き編集しますか？")) return;

  const obj = existing || { id: uid() };
  obj.name = name;
  obj.firstDate = firstDateEl.value || "";
  obj.status = statusEl.value;
  obj.times = Math.max(0, parseInt(timesEl.value||"0",10));
  obj.memo = memoEl.value || "";
  obj.allergens = selectedAllergens;

  if(existing){
    state.foods = state.foods.map(f=> f.id===existing.id ? obj : f);
  }else{
    state.foods.push(obj);
  }

  // 入力は軽く残す派もいるので、食材名だけクリア
  foodNameEl.value = "";
  timesEl.value = String(obj.times);
  render();
});

el("clearFormBtn").addEventListener("click", ()=>{
  foodNameEl.value="";
  firstDateEl.value=todayStr();
  statusEl.value="未導入";
  timesEl.value="0";
  memoEl.value="";
  Array.from(foodAllergensEl.options).forEach(o=>o.selected=false);
});

listEl.addEventListener("click", (e)=>{
  const btn = e.target.closest("button");
  if(!btn) return;
  const act = btn.dataset.act;
  const id = btn.dataset.id;
  const f = state.foods.find(x=>x.id===id);
  if(!f) return;

  if(act==="del"){
    if(!confirm(`"${f.name}" を削除する？`)) return;
    state.foods = state.foods.filter(x=>x.id!==id);
    render();
  }
  if(act==="inc"){
    f.times = (parseInt(f.times||0,10) || 0) + 1;
    if(!f.firstDate) f.firstDate = todayStr();
    if(f.status==="未導入") f.status="問題なし";
    render();
  }
  if(act==="edit"){
    foodNameEl.value = f.name || "";
    firstDateEl.value = f.firstDate || "";
    statusEl.value = f.status || "未導入";
    timesEl.value = String(f.times ?? 0);
    memoEl.value = f.memo || "";
    // allergens select
    const set = new Set(f.allergens||[]);
    Array.from(foodAllergensEl.options).forEach(o=> o.selected = set.has(o.value));
    // スクロール
    window.scrollTo({top:0, behavior:"smooth"});
  }
});

el("addLogBtn").addEventListener("click", ()=>{
  if(state.foods.length===0){ alert("先に食材を追加してね"); return; }
  const foodId = logFoodEl.value;
  const date = logDateEl.value || todayStr();
  const amount = (logAmountEl.value||"").trim();
  const note = (logNoteEl.value||"").trim();

  state.logs.push({ id: uid(), date, foodId, amount, note });

  // 回数を自動+1（便利）
  const f = state.foods.find(x=>x.id===foodId);
  if(f){
    f.times = (parseInt(f.times||0,10) || 0) + 1;
    if(!f.firstDate) f.firstDate = date;
    if(f.status==="未導入") f.status="問題なし";
  }

  logAmountEl.value="";
  logNoteEl.value="";
  render();
});

logsEl.addEventListener("click", (e)=>{
  const btn = e.target.closest("button");
  if(!btn) return;
  const act = btn.dataset.act;
  if(act!=="logdel") return;
  const id = btn.dataset.id;
  state.logs = state.logs.filter(l=>l.id!==id);
  render();
});

el("clearLogsBtn").addEventListener("click", ()=>{
  if(!confirm("ログを全部削除する？（食材リストは残る）")) return;
  state.logs = [];
  render();
});

el("exportBtn").addEventListener("click", ()=>{
  const data = JSON.stringify(state, null, 2);
  const blob = new Blob([data], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "weaning_progress_export.json";
  a.click();
  URL.revokeObjectURL(url);
});

el("importBtn").addEventListener("click", async ()=>{
  const inp = document.createElement("input");
  inp.type="file";
  inp.accept="application/json";
  inp.onchange = async ()=>{
    const file = inp.files?.[0];
    if(!file) return;
    const text = await file.text();
    try{
      const obj = JSON.parse(text);
      if(!obj || typeof obj!=="object") throw new Error("invalid");
      // 軽いバリデーション
      obj.stage ||= "初期(ごっくん)";
      obj.allergens ||= {};
      obj.foods ||= [];
      obj.logs ||= [];
      state = obj;
      save(state);
      initAllergens();
      setDefaults();
      render();
      alert("インポートしました");
    }catch(err){
      alert("JSONの読み込みに失敗しました");
    }
  };
  inp.click();
});

el("resetBtn").addEventListener("click", ()=>{
  if(!confirm("全部消します。本当に？")) return;
  localStorage.removeItem(KEY);
  state = load();
  initAllergens();
  setDefaults();
  render();
});

function boot(){
  initAllergens();
  setDefaults();
  render();
}
boot();
