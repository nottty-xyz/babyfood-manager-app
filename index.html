<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>離乳食 週次献立プランナー</title>
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;margin:16px;background:#f4f6f8}
    .card{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:12px}
    button{padding:10px 12px;border-radius:12px;border:0;background:#2563eb;color:#fff;font-weight:700}
    select{padding:10px;border-radius:12px;border:1px solid #e5e7eb}
    pre{white-space:pre-wrap;word-break:break-word}
  </style>
</head>
<body>
  <div class="card">
    <h1 style="margin:0 0 10px;">離乳食 週次献立プランナー</h1>

    <label>フェーズ：</label>
    <select id="phase">
      <option>初期</option>
      <option selected>中期</option>
      <option>後期</option>
      <option>完了期</option>
    </select>

    <button id="gen" style="margin-left:8px;">1週間生成</button>

    <h2>結果</h2>
    <pre id="out">まだ生成していません</pre>
  </div>

<script type="module">
  const phaseEl = document.getElementById("phase");
  const outEl = document.getElementById("out");
  const genBtn = document.getElementById("gen");

  outEl.textContent = "module読み込みOK（ボタンで生成します）";

  try {
    const mod = await import("./js/planner.js");
    const generateWeeklyPlan = mod.generateWeeklyPlan;

    genBtn.addEventListener("click", () => {
      try {
        outEl.textContent = "生成中…";

        const result = generateWeeklyPlan({ phase: phaseEl.value });

        const warnings = (result.warnings && result.warnings.length)
          ? result.warnings.join("\n")
          : "なし";

        outEl.textContent =
          "=== WARNINGS ===\n" + warnings +
          "\n\n=== PLAN ===\n" + JSON.stringify(result.plan, null, 2) +
          "\n\n=== LEFTOVERS ===\n" + JSON.stringify(result.leftovers, null, 2) +
          "\n\n=== META ===\n" + JSON.stringify({
            phase: result.config?.phase,
            requiredBlocksPerWeek: result.requiredBlocksPerWeek,
            needKinds: result.needKinds,
            chosenFoods: result.chosenFoods,
            shortages: result.shortages
          }, null, 2);

      } catch (err) {
        console.error(err);
        outEl.textContent =
          "生成エラー:\n" + (err?.message || "") + "\n\n" + (err?.stack || String(err));
      }
    });
  } catch (err) {
    console.error(err);
    outEl.textContent =
      "読み込みエラー:\n" + (err?.message || "") + "\n\n" + (err?.stack || String(err));
  }
</script>
</body>
</html>
